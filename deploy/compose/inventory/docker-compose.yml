services:
  mongo-inventory:
    image: mongo:8.2.7
    container_name: mongo-inventory
    env_file:
      - .env
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand({ ping: 1 }).ok' | mongosh --quiet -u ${MONGO_INITDB_ROOT_USERNAME} -p ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase ${MONGO_AUTH_DB}",
        ]

      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    networks:
      factory-network:

