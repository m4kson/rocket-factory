syntax = "proto3";

package payment.v1;


option go_package = "github.com/m4kson/rocket-factory/shared/pkg/proto/payment/v1;payment_v1";

service PaymentService {
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// PayOrderResponse содержит uuid транзакции, которая была создана в результате оплаты заказа
message PayOrderResponse {
  string transaction_uuid = 1;
}

// PaymentMethod содержит информацию о способе оплаты, который использует пользователь для оплаты заказа
message PaymentMethod {
  oneof method {
    string unknown = 1;
    string card = 2;
    string sbp = 3;
    string credit_card = 4;
    string investor_money = 5;
  }
}

// PayOrderRequest содержит информацию о заказе, который пользователь хочет оплатить, а также информацию о способе оплаты, который он использует
message PayOrderRequest {
  string order_uuid = 1;
  string user_uuid = 2;
  PaymentMethod payment_method = 3;
}