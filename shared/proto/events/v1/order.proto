syntax = "proto3";

package events.v1;

option go_package = "github.com/m4kson/rocket-factory/shared/pkg/proto/inventory/v1;events_v1";

// Заказ на сборку оплачен
message OrderPaid {
  string event_uuid = 1;
  string order_uuid = 2;
  string user_uuid = 3;
  string payment_method = 4;
  string transaction_uuid = 5;
}

// Сборка завершена
message ShipAssembled {
  string event_uuid = 1;
  string order_uuid = 2;
  string user_uuid = 3;
  int64 build_time_sec = 4;
}