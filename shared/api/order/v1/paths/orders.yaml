post:
  summary: "Создать новый заказ"
  operationId: "createOrder"
  tags:
    - Order
  requestBody:
    description: "Детали нового заказа"
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/create_order_request.yaml
  responses:
    201:
      description: "Заказ успешно создан"
      content:
        application/json:
          schema:
            $ref: ../components/create_order_response.yaml
    400:
      description: "Bad Request - неверные данные в запросе"
      content:
        application/json:
          schema:
            $ref: ../components/errors/bad_request_error.yaml
    401:
      description: "Unauthorized - пользователь не авторизован"
      content:
        application/json:
          schema:
            $ref: ../components/errors/unauthorized_error.yaml
    403:
      description: "Forbidden - у пользователя нет прав доступа к заказу"
      content:
        application/json:
          schema:
            $ref: ../components/errors/forbidden_error.yaml
    429:
      description: "Too Many Requests - превышен лимит запросов"
      content:
        application/json:
          schema:
            $ref: ../components/errors/rate_limit_error.yaml
    500:
      description: "Internal Server Error - внутренняя ошибка сервера"
      content:
        application/json:
          schema:
            $ref: ../components/errors/internal_server_error.yaml
    502:
      description: "Bad Gateway - ошибка шлюза"
      content:
        application/json:
          schema:
            $ref: ../components/errors/bad_gateway_error.yaml