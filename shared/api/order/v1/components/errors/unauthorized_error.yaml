type: object
required:
  - code
  - message
properties:
  code:
    type: integer
    description: HTTP status code representing the error type (e.g., 401 for Unauthorized).
    example: 401
  message:
    type: string
    description: A human-readable message providing more details about the error.
    example: "Unauthorized - пользователь не авторизован"
