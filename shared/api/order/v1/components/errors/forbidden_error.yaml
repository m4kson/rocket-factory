type: object
required:
  - code
  - message
properties:
  code:
    type: integer
    description: HTTP status code representing the error type (e.g., 403 for Forbidden error).
    example: 403
  message:
    type: string
    description: A human-readable message providing more details about the error.
    example: "Forbidden: You do not have permission to access this resource."